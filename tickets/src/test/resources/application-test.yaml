spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: integration-test-jwt-secret-goosebeoms-tickets-32bytes-min!!
  expiration: 86400000

app:
  cors:
    allowed-origins: http://localhost:5173
  redisson:
    enabled: true
  queue:
    enabled: true
    active-capacity: 100
    token-ttl-seconds: 600
    seconds-per-person: 2
    # 자동 promotion이 wait ZSET을 비워서 동시성 테스트가 깨지지 않도록 사실상 비활성화.
    # promotion 동작을 검증하는 테스트(QueuePromotionOrderTest)는 scheduler.runOnce()를 수동 호출한다.
    promotion-interval-ms: 86400000

logging:
  level:
    root: WARN
    org.hibernate.SQL: WARN
    com.goosebeoms.tickets: INFO

server:
  port: 8888