spring:
  application:
    name: tickets
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:}
  access-expiration: ${JWT_ACCESS_EXPIRATION:1800000}      # 30분
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:1209600000} # 14일

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  redisson:
    enabled: ${REDISSON_ENABLED:true}
  queue:
    enabled: ${QUEUE_ENABLED:true}
    active-capacity: ${QUEUE_ACTIVE_CAPACITY:100}
    token-ttl-seconds: ${QUEUE_TOKEN_TTL_SECONDS:600}
    seconds-per-person: ${QUEUE_SECONDS_PER_PERSON:2}
    promotion-interval-ms: ${QUEUE_PROMOTION_INTERVAL_MS:1000}
  payment:
    gateway: ${PAYMENT_GATEWAY:mock}
    toss:
      client-key: ${TOSS_CLIENT_KEY:}
      secret-key: ${TOSS_SECRET_KEY:}
      variant-key: ${TOSS_VARIANT_KEY:DEFAULT}
      base-url: ${TOSS_BASE_URL:https://api.tosspayments.com}
      connect-timeout-ms: ${TOSS_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${TOSS_READ_TIMEOUT_MS:10000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    redis:
      enabled: false

server:
  port: 8888
