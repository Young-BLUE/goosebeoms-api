spring:
  application:
    name: tickets
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  redisson:
    enabled: ${REDISSON_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    redis:
      enabled: false

server:
  port: 8080
