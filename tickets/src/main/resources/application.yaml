spring:
  application:
    name: tickets

  datasource:
    url: jdbc:h2:mem:ticketsdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: goosebeoms-ticketing-jwt-secret-key-must-be-256bits-long-enough
  expiration: 86400000

management:
  health:
    redis:
      enabled: false

server:
  port: 8080
